<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="A live scavenger hunt leaderboard powered by a public Google Sheet." />
  <title>Scavenger Hunt Leaderboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="wrap">
    <svg class="corner-scrib" viewBox="0 0 150 60" aria-hidden="true">
      <path d="M6 42 C 26 18, 40 50, 60 26 S 96 44, 118 20 S 140 38, 146 24" />
      <path d="M118 8 l 4 9 9 2 -7 6 2 9 -8 -5 -8 5 2 -9 -7 -6 9 -2 z" stroke-width="3" />
    </svg>

    <header class="head">
      <div class="titlewrap">
        <a class="brand" href="https://classkick.com" target="_blank" rel="noopener">
          <img src="https://classkick.com/images/dfs.svg" alt="Classkick"
               onerror="this.closest('.brand').style.display='none'" />
        </a>
        <h1 class="title"><span class="spark">🏆</span> Scavenger Hunt Leaderboard</h1>
        <svg class="scribble" viewBox="0 0 300 14" preserveAspectRatio="none" aria-hidden="true">
          <path d="M4 9 C 64 2, 128 13, 192 6 S 268 11, 296 5" />
        </svg>
        <p class="subtitle" id="subtitle">Loading…</p>
      </div>

      <div class="tools">
        <button class="btn" id="refreshBtn" type="button">
          <span class="ic" aria-hidden="true">🔄</span>Refresh
        </button>
      </div>
    </header>

    <main id="board"></main>

    <footer class="foot" id="foot"></footer>
  </div>

  <!-- config.js MUST load before app.js (it defines SHEET_URL etc.) -->
  <script defer src="config.js"></script>
  <script defer src="app.js"></script>
</body>
</html>
