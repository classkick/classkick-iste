<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grand Prize Raffle — Picker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Manrope:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #25c582;
        --green-dark: #149962;
        --ink: #2c3438;
        --muted: #6d6e70;
        --border: #e5e5e5;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font-family: "Manrope", system-ui, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(820px 480px at 6% -8%, #e3f6e9 0%, transparent 55%),
          radial-gradient(760px 520px at 100% -6%, #fbf7cf 0%, transparent 50%),
          #fbfdf8;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(440px, 100%);
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: 0 0 8px 1px rgba(64, 67, 69, 0.13);
        padding: 32px 28px;
        text-align: center;
      }
      h1 {
        font-family: "Fredoka", sans-serif;
        font-weight: 700;
        font-size: 28px;
        margin: 0 0 4px;
        color: var(--green-dark);
      }
      p {
        color: var(--muted);
        font-weight: 600;
        font-size: 14px;
        margin: 0 0 20px;
      }
      .versions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      a.ver {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        font-weight: 800;
        font-size: 16px;
        color: #fff;
        background: var(--green);
        border-radius: 14px;
        padding: 14px 18px;
        transition:
          transform 0.15s,
          background 0.15s;
      }
      a.ver:hover {
        transform: translateY(-2px);
        background: var(--green-dark);
      }
      a.ver .tag {
        font-size: 12px;
        font-weight: 700;
        opacity: 0.9;
      }
      .ver.soon {
        background: #f1f5f2;
        color: var(--muted);
        pointer-events: none;
        cursor: default;
      }
      footer {
        margin-top: 18px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>🎉 Grand Prize Raffle</h1>
      <p>Visual raffle picker — choose a version.</p>
      <div class="versions">
        <a class="ver" href="v1/">
          <span>Version 1</span>
          <span class="tag">current</span>
        </a>
        <span class="ver soon">
          <span>Version 2</span>
          <span class="tag">coming soon</span>
        </span>
      </div>
      <footer>Press F for full screen once a version is open.</footer>
    </main>
  </body>
</html>
